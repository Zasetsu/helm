name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to publish (e.g. v0.1.0). Must already be pushed.'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build universal DMG
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install librsvg (for icon regeneration)
        run: brew install librsvg

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Regenerate icon
        run: npm run build:icon

      - name: Build universal DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run release:mac

      - name: Generate checksums
        working-directory: dist
        run: |
          shasum -a 256 *.dmg *.zip > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload artifacts (workflow run)
        uses: actions/upload-artifact@v4
        with:
          name: osxstats-build
          path: |
            dist/*.dmg
            dist/*.zip
            dist/SHA256SUMS.txt
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || github.event.inputs.tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.dmg
            dist/*.zip
            dist/SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
