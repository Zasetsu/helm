<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4FA3FF"/>
      <stop offset="55%" stop-color="#7B7CFF"/>
      <stop offset="100%" stop-color="#B86FFF"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <filter id="bar-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#000" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#bg)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="232" ry="232" fill="url(#sheen)"/>

  <g filter="url(#bar-shadow)" fill="white">
    <rect x="232" y="600" width="128" height="240" rx="22"/>
    <rect x="408" y="448" width="128" height="392" rx="22"/>
    <rect x="584" y="288" width="128" height="552" rx="22"/>
    <rect x="760" y="488" width="36" height="352" rx="14" fill-opacity="0.6"/>
  </g>

  <path d="M 232 232 Q 320 200 408 248 T 584 232 T 760 280"
        stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"
        fill="none" stroke-opacity="0.55"/>
  <circle cx="232" cy="232" r="14" fill="white" fill-opacity="0.85"/>
  <circle cx="760" cy="280" r="14" fill="white" fill-opacity="0.85"/>
</svg>
